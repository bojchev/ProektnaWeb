<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vaultly – Sign In</title>


    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

    <link rel="stylesheet" href="../../static/css/app.css">
</head>
<body class="auth-page">

    <div class="auth-card">


        <img src="../../static/img/logo.svg" alt="Vaultly" class="auth-logo">


        <div class="auth-tabs">
            <button class="auth-tab-btn active" id="tab-login"  onclick="switchTab('login')">LOG IN</button>
            <button class="auth-tab-btn"        id="tab-signup" onclick="switchTab('signup')">SIGN UP</button>
        </div>


        <form class="auth-form active" id="form-login" method="post" action="{% url 'login' %}">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label">Username</label>
                <input type="text" name="username" class="form-control" placeholder="your_username" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Password</label>
                <div class="position-relative">
                    <input type="password" name="password" id="login-pwd" class="form-control pe-5" placeholder="••••••••" required>
                    <button type="button" class="btn-icon-eye" onclick="togglePwd('login-pwd', this)">
                        <i class="bi bi-eye"></i>
                    </button>
                </div>
            </div>

            <div class="d-flex justify-content-between align-items-center mb-1">
                <div class="form-check mb-0">
                    <input class="form-check-input" type="checkbox" id="remember-me">
                    <label class="form-check-label" for="remember-me" style="font-size:0.8rem; color: var(--text-muted);">Remember me</label>
                </div>
                <a href="#" style="font-size:0.8rem; color: var(--blue); text-decoration:none;">Forgot password?</a>
            </div>

            <button type="submit" class="auth-submit-btn">→ ENTER VAULTLY</button>

            <p style="text-align:center; margin-top:14px; font-size:0.8rem; color: var(--text-muted);">
                Don't have an account?
                <a href="#" onclick="switchTab('signup')" style="color:var(--blue); font-weight:600; text-decoration:none;">Sign up free</a>
            </p>
        </form>


        <form class="auth-form" id="form-signup" method="post" action="{% url 'register' %}">
            {% csrf_token %}

            <div class="row g-3 mb-3">
                <div class="col-6">
                    <label class="form-label">First Name</label>
                    <input type="text" name="first_name" class="form-control" placeholder="Alex" required>
                </div>
                <div class="col-6">
                    <label class="form-label">Last Name</label>
                    <input type="text" name="last_name" class="form-control" placeholder="Smith">
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">Username</label>
                <input type="text" name="username" class="form-control" placeholder="alex_smith" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" name="email" class="form-control" placeholder="alex@example.com" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Password</label>
                <div class="position-relative">
                    <input type="password" name="password1" id="signup-pwd" class="form-control pe-5" placeholder="••••••••" required>
                    <button type="button" class="btn-icon-eye" onclick="togglePwd('signup-pwd', this)">
                        <i class="bi bi-eye"></i>
                    </button>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">Confirm Password</label>
                <input type="password" name="password2" class="form-control" placeholder="••••••••" required>
            </div>


            <div class="mb-3">
                <label class="form-label">Risk Tolerance</label>
                <div class="risk-group" id="risk-group">
                    <div class="risk-option selected" data-value="conservative" onclick="selectRisk(this)">
                        <span class="risk-pct">10%</span>
                        Conservative
                    </div>
                    <div class="risk-option" data-value="moderate" onclick="selectRisk(this)">
                        <span class="risk-pct">20%</span>
                        Moderate
                    </div>
                    <div class="risk-option" data-value="aggressive" onclick="selectRisk(this)">
                        <span class="risk-pct">30%</span>
                        Aggressive
                    </div>
                </div>
                <input type="hidden" name="risk_tolerance" id="risk-input" value="conservative">
            </div>

            <button type="submit" class="auth-submit-btn">CREATE ACCOUNT →</button>

            <p style="text-align:center; margin-top:14px; font-size:0.8rem; color: var(--text-muted);">
                Already have an account?
                <a href="#" onclick="switchTab('login')" style="color:var(--blue); font-weight:600; text-decoration:none;">Log in</a>
            </p>
        </form>

    </div>


    <style>
        .btn-icon-eye {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 0;
            font-size: 1rem;
        }
        .btn-icon-eye:hover { color: var(--blue); }
    </style>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
            crossorigin="anonymous"></script>

    <script>
        function switchTab(tab) {
            document.querySelectorAll('.auth-tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
            document.getElementById('tab-' + tab).classList.add('active');
            document.getElementById('form-' + tab).classList.add('active');
        }

        function selectRisk(el) {
            document.querySelectorAll('.risk-option').forEach(o => o.classList.remove('selected'));
            el.classList.add('selected');
            document.getElementById('risk-input').value = el.dataset.value;
        }

        function togglePwd(inputId, btn) {
            const inp = document.getElementById(inputId);
            const icon = btn.querySelector('i');
            if (inp.type === 'password') {
                inp.type = 'text';
                icon.className = 'bi bi-eye-slash';
            } else {
                inp.type = 'password';
                icon.className = 'bi bi-eye';
            }
        }
    </script>

</body>
</html>
