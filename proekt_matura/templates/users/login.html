<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vaultly – Log In</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../../static/css/app.css">
</head>
<body class="auth-page">

    <div class="auth-card">
        <img src="../../static/img/logo.svg" alt="Vaultly" class="auth-logo">

        <h3 style="font-family:'Playfair Display',serif; text-align:center; margin-bottom:1.5rem;">Welcome back</h3>

        {% if form.errors %}
        <div style="background:#fdecea; color:#c62828; border-radius:10px; padding:10px 14px; margin-bottom:16px; font-size:0.85rem;">
            Invalid username or password. Please try again.
        </div>
        {% endif %}

        {% for message in messages %}
        <div style="background:#fdecea; color:#c62828; border-radius:10px; padding:10px 14px; margin-bottom:16px; font-size:0.85rem;">
            {{ message }}
        </div>
        {% endfor %}

        <form class="auth-form active" method="post" action="{% url 'login' %}">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label">Username</label>
                <input type="text" name="username" class="form-control" placeholder="your_username" required autofocus>
            </div>

            <div class="mb-3">
                <label class="form-label">Password</label>
                <div class="position-relative">
                    <input type="password" name="password" id="login-pwd" class="form-control pe-5" placeholder="••••••••" required>
                    <button type="button" class="btn-icon-eye" onclick="togglePwd('login-pwd', this)">
                        <i class="bi bi-eye"></i>
                    </button>
                </div>
            </div>

            <button type="submit" class="auth-submit-btn">LOG IN</button>

            <p style="text-align:center; margin-top:14px; font-size:0.85rem; color: var(--text-muted);">
                Don't have an account?
                <a href="{% url 'signup' %}" style="color:var(--blue); font-weight:600; text-decoration:none;">Sign up free</a>
            </p>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
            crossorigin="anonymous"></script>
    <script>
        function togglePwd(inputId, btn) {
            const inp = document.getElementById(inputId);
            const icon = btn.querySelector('i');
            if (inp.type === 'password') {
                inp.type = 'text';
                icon.className = 'bi bi-eye-slash';
            } else {
                inp.type = 'password';
                icon.className = 'bi bi-eye';
            }
        }
    </script>
</body>
</html>
