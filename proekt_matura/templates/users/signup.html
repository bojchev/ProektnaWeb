<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vaultly – Sign Up</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../../static/css/app.css">
</head>
<body class="auth-page">

    <div class="auth-card">
        <img src="../../static/img/logo.svg" alt="Vaultly" class="auth-logo">

        <h3 style="font-family:'Playfair Display',serif; text-align:center; margin-bottom:1.5rem;">Create your account</h3>

        {% for message in messages %}
        <div style="background:#fdecea; color:#c62828; border-radius:10px; padding:10px 14px; margin-bottom:16px; font-size:0.85rem;">
            {{ message }}
        </div>
        {% endfor %}

        <form class="auth-form active" method="post" action="{% url 'signup' %}">
            {% csrf_token %}

            <div class="row g-3 mb-3">
                <div class="col-6">
                    <label class="form-label">First Name</label>
                    <input type="text" name="first_name" class="form-control" placeholder="Alex" required>
                </div>
                <div class="col-6">
                    <label class="form-label">Last Name</label>
                    <input type="text" name="last_name" class="form-control" placeholder="Smith">
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">Username</label>
                <input type="text" name="username" class="form-control" placeholder="alex_smith" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" name="email" class="form-control" placeholder="alex@example.com" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Password</label>
                <div class="position-relative">
                    <input type="password" name="password1" id="signup-pwd" class="form-control pe-5" placeholder="••••••••" required>
                    <button type="button" class="btn-icon-eye" onclick="togglePwd('signup-pwd', this)">
                        <i class="bi bi-eye"></i>
                    </button>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">Confirm Password</label>
                <input type="password" name="password2" class="form-control" placeholder="••••••••" required>
            </div>


            <div class="mb-3">
                <label class="form-label">Risk Tolerance</label>
                <div class="risk-group" id="risk-group">
                    <div class="risk-option selected" data-value="conservative" onclick="selectRisk(this)">
                        <span class="risk-pct">10%</span>
                        Conservative
                    </div>
                    <div class="risk-option" data-value="moderate" onclick="selectRisk(this)">
                        <span class="risk-pct">20%</span>
                        Moderate
                    </div>
                    <div class="risk-option" data-value="aggressive" onclick="selectRisk(this)">
                        <span class="risk-pct">30%</span>
                        Aggressive
                    </div>
                </div>
                <input type="hidden" name="risk_tolerance" id="risk-input" value="conservative">
            </div>

            <button type="submit" class="auth-submit-btn">CREATE ACCOUNT</button>

            <p style="text-align:center; margin-top:14px; font-size:0.85rem; color: var(--text-muted);">
                Already have an account?
                <a href="{% url 'login' %}" style="color:var(--blue); font-weight:600; text-decoration:none;">Log in</a>
            </p>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
            crossorigin="anonymous"></script>
    <script>
        function selectRisk(el) {
            document.querySelectorAll('.risk-option').forEach(o => o.classList.remove('selected'));
            el.classList.add('selected');
            document.getElementById('risk-input').value = el.dataset.value;
        }

        function togglePwd(inputId, btn) {
            const inp = document.getElementById(inputId);
            const icon = btn.querySelector('i');
            if (inp.type === 'password') {
                inp.type = 'text';
                icon.className = 'bi bi-eye-slash';
            } else {
                inp.type = 'password';
                icon.className = 'bi bi-eye';
            }
        }
    </script>
</body>
</html>
